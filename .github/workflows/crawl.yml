name: Daily Image Crawler

on:
  schedule:
    - cron: '0 21 * * *'  # 21:00 UTC = 06:00 KST
  workflow_dispatch:       # 수동 실행 가능

concurrency:
  group: image-crawl
  cancel-in-progress: true

jobs:
  crawl-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow

      - name: Run image crawler
        run: node scripts/crawl_images.js
        timeout-minutes: 15

      - name: Commit and push updated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          if git diff --cached --quiet; then
            echo "No image changes to commit."
          else
            git commit -m "chore: daily image refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Image crawler failed on ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '## Image Crawler Failure',
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Time:** ${new Date().toISOString()}`,
              '',
              'The daily image crawl workflow failed. Check the run logs for details.',
              '',
              'Common causes:',
              '- API rate limits or downtime (dog.ceo, cataas.com, tinyfox.dev, randomfox.ca)',
              '- Network timeouts',
              '- Python/Pillow resize errors',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['automation']
            });
